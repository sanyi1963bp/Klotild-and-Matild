# ArchMorph Professional – konfigurációs fájl
# Szerkeszthető szövegszerkesztővel (pl. VS Code).
# Ha a fájl nem létezik, a program beépített alapértékeket használ.

[ui]
language = "hu"

[match.superpoint]
max_keypoints        = 4096
detection_threshold  = 0.005
nms_radius           = 4
match_threshold      = 0.10
depth_confidence     = 0.95
width_confidence     = 0.99

[match.disk]
max_keypoints    = 5000
match_threshold  = 0.10

[match.loftr]
pretrained         = "outdoor"
conf_threshold     = 0.50

[match.sift]
max_keypoints      = 0
octave_layers      = 3
contrast_threshold = 0.04
edge_threshold     = 10.0
sigma              = 1.6
ratio_threshold    = 0.80

[match.ransac]
reproj_threshold = 3.0

[export.defaults]
frame_count = 40
fps         = 25.0
method      = "Delaunay háromszög"
easing      = "S-görbe"
ping_pong   = false

[flow.presets.fast]
pyr_scale  = 0.5
levels     = 3
winsize    = 15
iterations = 3
poly_n     = 5
poly_sigma = 1.1

[flow.presets.normal]
pyr_scale  = 0.5
levels     = 4
winsize    = 21
iterations = 4
poly_n     = 7
poly_sigma = 1.5

[flow.presets.detailed]
pyr_scale  = 0.5
levels     = 5
winsize    = 33
iterations = 5
poly_n     = 7
poly_sigma = 1.5
